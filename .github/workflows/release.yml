name: иҮӘеҠЁжү“еҢ…е№¶еҸ‘еёғ

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: жЈҖеҮәжәҗз Ғ
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: иҜ»еҸ–зүҲжң¬еҸ·е№¶жЈҖжҹҘйҮҚеӨҚзүҲжң¬
        id: version
        shell: pwsh
        run: |
          $content = Get-Content -LiteralPath "app.py" -Raw -Encoding UTF8
          $match = [regex]::Match($content, 'APP_VERSION\s*=\s*"([^"]+)"')
          if (-not $match.Success) { throw "ж— жі•д»Һ app.py иҜ»еҸ– APP_VERSION" }
          $version = $match.Groups[1].Value
          $tag = "v$version"
          if (git tag --list $tag) {
            throw "зүҲжң¬ $tag е·Із»ҸеҸ‘еёғгҖӮиҜ·е…Ҳдҝ®ж”№ app.py дёӯзҡ„ APP_VERSIONгҖӮ"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: е®үиЈ… Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: е®үиЈ…жһ„е»әдҫқиө–
        shell: pwsh
        run: python -m pip install -r requirements.txt

      - name: жЈҖжҹҘжәҗз Ғ
        shell: pwsh
        run: python -m py_compile app.py backend.py

      - name: жһ„е»ә Windows зӢ¬з«ӢзЁӢеәҸ
        shell: pwsh
        run: pyinstaller --noconfirm --clean "её•йІҒдјҷдјҙзј–иҫ‘еҷЁ.spec"

      - name: з”ҹжҲҗеҸ‘еёғеҺӢзј©еҢ…е’Ңж ЎйӘҢеҖј
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $folderName = "её•йІҒдјҷдјҙзј–иҫ‘еҷЁ_v$version"
          $assetName = "Palworld-Partner-Editor-CN_v$version.zip"
          $root = Join-Path $PWD "release-build"
          $folder = Join-Path $root $folderName
          $source = Join-Path $folder "жәҗд»Јз Ғ"
          New-Item -ItemType Directory -Path $source -Force | Out-Null

          Copy-Item -LiteralPath "dist\её•йІҒдјҷдјҙзј–иҫ‘еҷЁ.exe" -Destination $folder
          foreach ($file in @(
            "LICENSE.txt",
            "PALWORLD_SAVE_TOOLS_SOURCE.txt",
            "README.md",
            "THIRD_PARTY_PALCALC_LICENSE.txt",
            "THIRD_PARTY_PALEDIT_LICENSE.txt",
            "её•йІҒдјҷдјҙзј–иҫ‘еҷЁдҪҝз”ЁиҜҙжҳҺ.txt"
          )) {
            if (Test-Path -LiteralPath $file) { Copy-Item -LiteralPath $file -Destination $folder }
          }
          $testNote = Get-ChildItem -File -Filter "жөӢиҜ•иҜҙжҳҺ_v*.txt" |
            Sort-Object Name -Descending | Select-Object -First 1
          if ($testNote) { Copy-Item -LiteralPath $testNote.FullName -Destination $folder }
          foreach ($file in @("app.py", "backend.py", "requirements.txt", "её•йІҒдјҷдјҙзј–иҫ‘еҷЁ.spec")) {
            Copy-Item -LiteralPath $file -Destination $source
          }

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $folder "её•йІҒдјҷдјҙзј–иҫ‘еҷЁ.exe")).Hash
          @("её•йІҒдјҷдјҙзј–иҫ‘еҷЁ.exe", "SHA256: $hash") |
            Set-Content -LiteralPath (Join-Path $folder "ж–Үд»¶ж ЎйӘҢ.txt") -Encoding UTF8

          $zip = Join-Path $root $assetName
          Compress-Archive -LiteralPath $folder -DestinationPath $zip -CompressionLevel Optimal
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "name=$assetName" >> $env:GITHUB_OUTPUT

      - name: еҲӣе»ә GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" `
            "${{ steps.package.outputs.zip }}#${{ steps.package.outputs.name }}" `
            --target "${{ github.sha }}" `
            --title "её•йІҒдјҷдјҙзј–иҫ‘еҷЁ ${{ steps.version.outputs.tag }}" `
            --generate-notes
