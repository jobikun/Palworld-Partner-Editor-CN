name: 自动打包并发布

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 读取版本号并检查重复版本
        id: version
        shell: pwsh
        run: |
          $content = Get-Content -LiteralPath "app.py" -Raw -Encoding UTF8
          $match = [regex]::Match($content, 'APP_VERSION\s*=\s*"([^"]+)"')
          if (-not $match.Success) { throw "无法从 app.py 读取 APP_VERSION" }
          $version = $match.Groups[1].Value
          $tag = "v$version"
          if (git tag --list $tag) {
            throw "版本 $tag 已经发布。请先修改 app.py 中的 APP_VERSION。"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装构建依赖
        shell: pwsh
        run: python -m pip install -r requirements.txt

      - name: 检查源码
        shell: pwsh
        run: python -m py_compile app.py backend.py

      - name: 构建 Windows 独立程序
        shell: pwsh
        run: pyinstaller --noconfirm --clean "帕鲁伙伴编辑器.spec"

      - name: 生成发布压缩包和校验值
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $name = "帕鲁伙伴编辑器_v$version"
          $root = Join-Path $PWD "release-build"
          $folder = Join-Path $root $name
          $source = Join-Path $folder "源代码"
          New-Item -ItemType Directory -Path $source -Force | Out-Null

          Copy-Item -LiteralPath "dist\帕鲁伙伴编辑器.exe" -Destination $folder
          foreach ($file in @(
            "LICENSE.txt",
            "PALWORLD_SAVE_TOOLS_SOURCE.txt",
            "README.md",
            "THIRD_PARTY_PALCALC_LICENSE.txt",
            "THIRD_PARTY_PALEDIT_LICENSE.txt",
            "帕鲁伙伴编辑器使用说明.txt"
          )) {
            if (Test-Path -LiteralPath $file) { Copy-Item -LiteralPath $file -Destination $folder }
          }
          $testNote = Get-ChildItem -File -Filter "测试说明_v*.txt" |
            Sort-Object Name -Descending | Select-Object -First 1
          if ($testNote) { Copy-Item -LiteralPath $testNote.FullName -Destination $folder }
          foreach ($file in @("app.py", "backend.py", "requirements.txt", "帕鲁伙伴编辑器.spec")) {
            Copy-Item -LiteralPath $file -Destination $source
          }

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $folder "帕鲁伙伴编辑器.exe")).Hash
          @("帕鲁伙伴编辑器.exe", "SHA256: $hash") |
            Set-Content -LiteralPath (Join-Path $folder "文件校验.txt") -Encoding UTF8

          $zip = Join-Path $root "$name.zip"
          Compress-Archive -LiteralPath $folder -DestinationPath $zip -CompressionLevel Optimal
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "name=$name.zip" >> $env:GITHUB_OUTPUT

      - name: 创建 GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" `
            "${{ steps.package.outputs.zip }}#${{ steps.package.outputs.name }}" `
            --target "${{ github.sha }}" `
            --title "帕鲁伙伴编辑器 ${{ steps.version.outputs.tag }}" `
            --generate-notes
